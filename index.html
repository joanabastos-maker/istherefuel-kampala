<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uganda Fuel Tracker</title>
  <meta name="description" content="Live fuel availability tracker for Kampala, Uganda. Find petrol and diesel stations near you." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --yellow: #FCDC04; --green: #1A8A4A; --orange: #D97706; --red: #C0200A; --bg: #F7F5F0; --card: #fff; --text: #111; --muted: #666; --border: #E0DDD5; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: #000; border-bottom: 3px solid var(--yellow); position: sticky; top: 0; z-index: 50; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .flag { display: flex; flex-direction: column; width: 28px; height: 18px; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .flag div { flex: 1; }
    .logo h1 { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .logo h1 span { color: var(--yellow); }
    .meta { font-family: 'Space Mono', monospace; font-size: 10px; color: #999; text-align: right; line-height: 1.8; }
    .live-dot { display: inline-block; width: 6px; height: 6px; background: #4CAF50; border-radius: 50%; margin-right: 4px; animation: blink 1.4s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
    .update-bar { background: #0a0a0a; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'Space Mono', monospace; font-size: 10px; color: #555; }
    .refresh-btn { background: none; border: 1px solid #333; color: #555; font-size: 10px; font-family: 'Space Mono', monospace; padding: 3px 9px; border-radius: 3px; cursor: pointer; transition: all .2s; }
    .refresh-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .zones { background: #111; padding: 9px 20px; display: flex; gap: 7px; overflow-x: auto; border-bottom: 1px solid #1e1e1e; -webkit-overflow-scrolling: touch; }
    .zones::-webkit-scrollbar { display: none; }
    .zbtn { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 13px; border-radius: 20px; border: 1px solid #333; background: none; color: #777; cursor: pointer; white-space: nowrap; transition: all .2s; }
    .zbtn.on { background: var(--yellow); color: #000; border-color: var(--yellow); }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); background: #fff; border-bottom: 1px solid var(--border); }
    .stt { padding: 14px 10px; text-align: center; border-right: 1px solid var(--border); }
    .stt:last-child { border-right: none; }
    .stt-n { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; }
    .stt-l { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .6px; }
    .g { color: var(--green); } .o { color: var(--orange); } .r { color: var(--red); }
    .filters { padding: 10px 16px; display: flex; gap: 7px; flex-wrap: wrap; background: #fff; border-bottom: 1px solid var(--border); align-items: center; }
    .fbtn { font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; padding: 5px 12px; border-radius: 4px; border: 1.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
    .fbtn.fa { background: #111; color: #fff; border-color: #111; }
    .fbtn.fg { background: var(--green); color: #fff; border-color: var(--green); }
    .fbtn.fo { background: var(--orange); color: #fff; border-color: var(--orange); }
    .fbtn.fr { background: var(--red); color: #fff; border-color: var(--red); }
    .fuel-toggle { margin-left: auto; display: flex; gap: 4px; }
    .ftog { font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 5px 10px; border-radius: 3px; border: 1.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
    .ftog.on { background: #111; color: var(--yellow); border-color: #111; }
    .list { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; transition: box-shadow .2s, transform .15s; }
    .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.08); transform: translateY(-1px); }
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
    .card.available::before { background: var(--green); }
    .card.queue::before { background: var(--orange); }
    .card.empty::before { background: var(--red); }
    .ct { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .cn { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .ca { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; font-family: 'Space Mono', monospace; flex-shrink: 0; }
    .bav { background: #E8F5EE; color: var(--green); }
    .bqu { background: #FFF3E0; color: var(--orange); }
    .bem { background: #FDECEA; color: var(--red); }
    .cb { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .ftags { display: flex; gap: 5px; }
    .ftag { font-size: 9px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 3px 7px; border-radius: 3px; background: #F0EDE6; color: #555; }
    .ctime { font-size: 10px; color: #bbb; font-family: 'Space Mono', monospace; }
    .empty { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }
    .empty p { font-size: 13px; margin-top: 6px; }
    .loading { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
    .report-fab { display: block; background: #000; color: var(--yellow); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; padding: 18px 22px; text-decoration: none; text-align: center; border-top: 3px solid var(--yellow); letter-spacing: 0.3px; transition: background .2s; }
    .report-fab:hover { background: #1a1a1a; }
    footer { text-align: center; padding: 16px 20px; font-size: 11px; color: #aaa; font-family: 'Space Mono', monospace; border-top: 1px solid var(--border); }
    @media (max-width: 480px) { .logo h1 { font-size: 15px; } .stt-n { font-size: 22px; } .fuel-toggle { margin-left: 0; } .filters { gap: 5px; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="flag" aria-hidden="true">
          <div style="background:#222"></div>
          <div style="background:#FCDC04"></div>
          <div style="background:#D90000"></div>
          <div style="background:#222"></div>
          <div style="background:#FCDC04"></div>
          <div style="background:#D90000"></div>
        </div>
        <h1>Uganda <span>Fuel</span> Tracker</h1>
      </div>
      <div class="meta">
        <div><span class="live-dot" aria-hidden="true"></span>LIVE</div>
        <div id="clk">--:--</div>
      </div>
    </div>
    <div class="update-bar">
      <span>next update: <span id="nxt">2:00</span></span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <nav class="zones" id="zones"></nav>

  <section class="stats">
    <div class="stt"><div class="stt-n g" id="ca">—</div><div class="stt-l">available</div></div>
    <div class="stt"><div class="stt-n o" id="cq">—</div><div class="stt-l">queue</div></div>
    <div class="stt"><div class="stt-n r" id="ce">—</div><div class="stt-l">empty</div></div>
  </section>

  <div class="filters">
    <button class="fbtn fa" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('available',this)">Available</button>
    <button class="fbtn" onclick="setFilter('queue',this)">Queue</button>
    <button class="fbtn" onclick="setFilter('empty',this)">Empty</button>
    <div class="fuel-toggle">
      <button class="ftog on" id="fp" onclick="setFuel('petrol')">PETROL</button>
      <button class="ftog" id="fd" onclick="setFuel('diesel')">DIESEL</button>
    </div>
  </div>

  <main class="list" id="list"><div class="loading">Loading stations...</div></main>

  <footer>
    <p>Data is community-reported. Help keep it accurate.</p>
  </footer>

  <a class="report-fab"
     href="https://docs.google.com/forms/d/e/1FAIpQLSdAV-Yqx9CZR06lknFyyOkbIdkOSzB6ZWM2BxCcwlwfwNuKmQ/viewform"
     target="_blank" rel="noopener">
    + Report a station
  </a>

    const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;
    let allStations = [];

    function parseCSVRow(row) {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < row.length; i++) {
        const c = row[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur.trim());
      return cols;
    }

    function parseStatus(raw) {
      if (!raw) return 'empty';
      const s = raw.toLowerCase().trim();
      if (s === 'empty' || s.includes('out of fuel') || s.includes('esgotado')) return 'empty';
      if (s.includes('with queue') || s.includes('com fila') || (s.includes('available') && s.includes('queue'))) return 'queue';
      if (s.includes('available') || s.includes('no queue') || s.includes('sem fila')) return 'available';
      return 'empty';
    }
