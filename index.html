<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uganda Fuel Tracker</title>
  <meta name="description" content="Live fuel availability tracker for Kampala, Uganda." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --yellow: #FCDC04; --green: #1A8A4A; --orange: #D97706; --red: #C0200A;
      --bg: #F7F5F0; --card: #fff; --text: #111; --muted: #666; --border: #E0DDD5;
      --header-bg: #000; --search-bg: #fff; --filter-bg: #fff;
    }
    body.dark {
      --bg: #1a1a1a; --card: #242424; --text: #f0f0f0; --muted: #aaa; --border: #333;
      --header-bg: #000; --search-bg: #2a2a2a; --filter-bg: #242424;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; transition: background .3s, color .3s; }
    header { background: var(--header-bg); border-bottom: 3px solid var(--yellow); position: sticky; top: 0; z-index: 50; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; padding: 13px 20px; }
    .logo { display: flex; align-items: center; gap: 10px; }
    .flag { display: flex; flex-direction: column; width: 28px; height: 18px; border-radius: 2px; overflow: hidden; flex-shrink: 0; }
    .flag div { flex: 1; }
    .logo h1 { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -0.3px; }
    .logo h1 span { color: var(--yellow); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .dark-btn { width: 36px; height: 20px; background: #333; border-radius: 10px; position: relative; cursor: pointer; border: none; flex-shrink: 0; transition: background .2s; }
    .dark-btn::after { content: ''; position: absolute; width: 14px; height: 14px; background: #aaa; border-radius: 50%; top: 3px; left: 3px; transition: all .2s; }
    body.dark .dark-btn { background: #FCDC04; }
    body.dark .dark-btn::after { left: 19px; background: #000; }
    .meta { font-family: 'Space Mono', monospace; font-size: 10px; color: #999; text-align: right; line-height: 1.8; }
    .live-dot { display: inline-block; width: 6px; height: 6px; background: #4CAF50; border-radius: 50%; margin-right: 4px; animation: blink 1.4s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: .2; } }
    .update-bar { background: #0a0a0a; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; font-family: 'Space Mono', monospace; font-size: 10px; color: #555; }
    .refresh-btn { background: none; border: 1px solid #333; color: #555; font-size: 10px; font-family: 'Space Mono', monospace; padding: 3px 9px; border-radius: 3px; cursor: pointer; transition: all .2s; }
    .refresh-btn:hover { border-color: var(--yellow); color: var(--yellow); }
    .search-bar { background: var(--search-bg); padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; transition: background .3s; }
    .search-icon { font-size: 16px; flex-shrink: 0; }
    .search-input { flex: 1; border: none; outline: none; font-family: 'Syne', sans-serif; font-size: 13px; color: var(--text); background: transparent; }
    .search-input::placeholder { color: var(--muted); }
    .near-me-btn { font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--yellow); background: var(--yellow); color: #000; cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; }
    .near-me-btn:hover { background: #e6c800; }
    .near-me-btn.active { background: #000; color: var(--yellow); border-color: #000; }
    body.dark .near-me-btn.active { background: var(--yellow); color: #000; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--filter-bg); border-bottom: 1px solid var(--border); transition: background .3s; }
    .stt { padding: 14px 10px; text-align: center; border-right: 1px solid var(--border); }
    .stt:last-child { border-right: none; }
    .stt-n { font-family: 'Space Mono', monospace; font-size: 26px; font-weight: 700; }
    .stt-l { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .6px; }
    .g { color: var(--green); } .o { color: var(--orange); } .r { color: var(--red); }
    .zones { background: #111; padding: 9px 20px; display: flex; gap: 7px; overflow-x: auto; border-bottom: 1px solid #1e1e1e; -webkit-overflow-scrolling: touch; }
    .zones::-webkit-scrollbar { display: none; }
    .zbtn { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 600; padding: 5px 13px; border-radius: 20px; border: 1px solid #333; background: none; color: #777; cursor: pointer; white-space: nowrap; transition: all .2s; }
    .zbtn.on { background: var(--yellow); color: #000; border-color: var(--yellow); }
    .filters { padding: 10px 16px; display: flex; gap: 7px; flex-wrap: wrap; background: var(--filter-bg); border-bottom: 1px solid var(--border); align-items: center; transition: background .3s; }
    .fbtn { font-size: 11px; font-weight: 700; font-family: 'Syne', sans-serif; padding: 5px 12px; border-radius: 4px; border: 1.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
    .fbtn.fa { background: #111; color: #fff; border-color: #111; }
    .fbtn.fg { background: var(--green); color: #fff; border-color: var(--green); }
    .fbtn.fo { background: var(--orange); color: #fff; border-color: var(--orange); }
    .fbtn.fr { background: var(--red); color: #fff; border-color: var(--red); }
    .fuel-toggle { margin-left: auto; display: flex; gap: 4px; }
    .ftog { font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 5px 10px; border-radius: 3px; border: 1.5px solid var(--border); background: none; color: var(--muted); cursor: pointer; transition: all .15s; }
    .ftog.on { background: #111; color: var(--yellow); border-color: #111; }
    .list { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; position: relative; overflow: hidden; transition: box-shadow .2s, background .3s; }
    .card:hover { box-shadow: 0 3px 14px rgba(0,0,0,.1); }
    .card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; border-radius: 0; }
    .card.available::before { background: var(--green); }
    .card.queue::before { background: var(--orange); }
    .card.empty::before { background: var(--red); }
    .ct { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
    .cn { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .ca { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .badge { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 20px; white-space: nowrap; font-family: 'Space Mono', monospace; flex-shrink: 0; }
    .bav { background: #E8F5EE; color: var(--green); }
    .bqu { background: #FFF3E0; color: var(--orange); }
    .bem { background: #FDECEA; color: var(--red); }
    .cb { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    .ftags { display: flex; gap: 5px; }
    .ftag { font-size: 9px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 3px 7px; border-radius: 3px; background: #F0EDE6; color: #555; }
    body.dark .ftag { background: #333; color: #aaa; }
    .ctime { font-size: 10px; color: #bbb; font-family: 'Space Mono', monospace; }
    .card-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
    .confirm-count { font-size: 10px; color: var(--green); font-family: 'Space Mono', monospace; }
    .share-btn { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; cursor: pointer; background: none; border: none; padding: 0; transition: color .15s; }
    .share-btn:hover { color: var(--yellow); }
    .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
    .btn-confirm { font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif; padding: 10px; border-radius: 8px; border: 1.5px solid #c8e6c9; background: #f1faf2; color: var(--green); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all .15s; }
    .btn-confirm:hover { background: #c8e6c9; }
    .btn-change { font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif; padding: 10px; border-radius: 8px; border: 1.5px solid var(--border); background: var(--card); color: var(--muted); cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all .15s; }
    .btn-change:hover { border-color: var(--orange); color: var(--orange); }
    .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
    .empty-state p { font-size: 13px; margin-top: 6px; }
    .loading { text-align: center; padding: 50px 20px; color: var(--muted); font-family: 'Space Mono', monospace; font-size: 12px; }
    .report-fab { position: fixed; bottom: 0; left: 0; right: 0; background: #000; color: var(--yellow); font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; padding: 16px 22px; text-decoration: none; text-align: center; border-top: 3px solid var(--yellow); z-index: 99; transition: background .2s; }
    .report-fab:hover { background: #1a1a1a; }
    footer { text-align: center; padding: 16px 20px; font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; border-top: 1px solid var(--border); }
    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #111; color: #fff; font-family: 'Space Mono', monospace; font-size: 12px; padding: 10px 20px; border-radius: 20px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 200; white-space: nowrap; }
    .toast.show { opacity: 1; }
    @media (max-width: 480px) { .logo h1 { font-size: 15px; } .stt-n { font-size: 22px; } .fuel-toggle { margin-left: 0; } .filters { gap: 5px; } }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">
        <div class="flag" aria-hidden="true">
          <div style="background:#222"></div><div style="background:#FCDC04"></div>
          <div style="background:#D90000"></div><div style="background:#222"></div>
          <div style="background:#FCDC04"></div><div style="background:#D90000"></div>
        </div>
        <h1>Uganda <span>Fuel</span> Tracker</h1>
      </div>
      <div class="header-right">
        <button class="dark-btn" onclick="toggleDark()" title="Toggle dark mode"></button>
        <div class="meta">
          <div><span class="live-dot"></span>LIVE</div>
          <div id="clk">--:--</div>
        </div>
      </div>
    </div>
    <div class="update-bar">
      <span>next update: <span id="nxt">2:00</span></span>
      <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
    </div>
  </header>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="search" placeholder="Search station or zone..." oninput="render()" />
    <button class="near-me-btn" id="nearme-btn" onclick="toggleNearMe()">📍 Near me</button>
  </div>

  <section class="stats">
    <div class="stt"><div class="stt-n g" id="ca">—</div><div class="stt-l">available</div></div>
    <div class="stt"><div class="stt-n o" id="cq">—</div><div class="stt-l">queue</div></div>
    <div class="stt"><div class="stt-n r" id="ce">—</div><div class="stt-l">empty</div></div>
  </section>

  <nav class="zones" id="zones"></nav>

  <div class="filters">
    <button class="fbtn fa" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('available',this)">Available</button>
    <button class="fbtn" onclick="setFilter('queue',this)">Queue</button>
    <button class="fbtn" onclick="setFilter('empty',this)">Empty</button>
    <div class="fuel-toggle">
      <button class="ftog on" id="fp" onclick="setFuel('petrol')">PETROL</button>
      <button class="ftog" id="fd" onclick="setFuel('diesel')">DIESEL</button>
    </div>
  </div>

  <main class="list" id="list"><div class="loading">Loading stations...</div></main>
  <footer><p>Data is community-reported. Help keep it accurate.</p></footer>

  <a class="report-fab" href="https://docs.google.com/forms/d/e/1FAIpQLSdAV-Yqx9CZR06lknFyyOkbIdkOSzB6ZWM2BxCcwlwfwNuKmQ/viewform" target="_blank" rel="noopener">
    + Report a station
  </a>

  <div class="toast" id="toast"></div>

  <script>
    const SHEET_ID = '2PACX-1vRB2fzVzqprPx-YUlES2jFZqptHzI2jo3xUTMJEJvU4RlldllWERg03pVkeTvtLvCkaq4GDB8cjsWqr';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/e/${SHEET_ID}/pub?output=csv`;
    const FORM_URL = 'https://docs.google.com/forms/d/e/1FAIpQLSdAV-Yqx9CZR06lknFyyOkbIdkOSzB6ZWM2BxCcwlwfwNuKmQ/viewform';
    let allStations = [], zone = "All zones", filter = "all", fuel = "petrol", countdown = 120;
    const confirmations = {};
    let userLat = null, userLng = null, nearMe = false;

    function toggleDark() { document.body.classList.toggle('dark'); }

    function toggleNearMe() {
      if (!nearMe) {
        if (!navigator.geolocation) { showToast('GPS not available on this device'); return; }
        navigator.geolocation.getCurrentPosition(pos => {
          userLat = pos.coords.latitude;
          userLng = pos.coords.longitude;
          nearMe = true;
          document.getElementById('nearme-btn').classList.add('active');
          document.getElementById('nearme-btn').textContent = '📍 Near me ✓';
          render();
        }, () => { showToast('Could not get your location'); });
      } else {
        nearMe = false;
        userLat = null; userLng = null;
        document.getElementById('nearme-btn').classList.remove('active');
        document.getElementById('nearme-btn').textContent = '📍 Near me';
        render();
      }
    }

    function parseCSVRow(row) {
      const cols = []; let cur = '', inQ = false;
      for (let i = 0; i < row.length; i++) {
        const c = row[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur.trim()); return cols;
    }

    function parseStatus(raw) {
      if (!raw) return 'empty';
      const s = raw.toLowerCase().trim();
      if (s === 'empty' || s.includes('out of fuel') || s.includes('esgotado')) return 'empty';
      if (s.includes('with queue') || s.includes('com fila')) return 'queue';
      if (s.includes('available') || s.includes('no queue') || s.includes('sem fila')) return 'available';
      return 'empty';
    }

    function timeAgo(dateStr) {
      if (!dateStr) return { text: 'unknown', old: false };
      const date = new Date(dateStr.replace(/\//g, '-'));
      if (isNaN(date)) return { text: 'recently', old: false };
      const diff = Math.floor((Date.now() - date) / 1000);
      let text;
      if (diff < 60) text = `${diff}s ago`;
      else if (diff < 3600) text = `${Math.floor(diff/60)} min ago`;
      else { const h = Math.floor(diff/3600), m = Math.floor((diff%3600)/60); text = m > 0 ? `${h}h ${m}min ago` : `${h}h ago`; }
      return { text, old: diff > 3600 };
    }

    function confirmStation(name) {
      confirmations[name] = (confirmations[name] || 0) + 1;
      showToast('Thanks for confirming!');
      render();
    }

    function shareStation(name) {
      const url = window.location.href.split('?')[0] + '?station=' + encodeURIComponent(name);
      if (navigator.clipboard) { navigator.clipboard.writeText(url).then(() => showToast('Link copied!')); }
      else { showToast('Link: ' + url); }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    async function loadData() {
      try {
        document.getElementById('list').innerHTML = '<div class="loading">Loading stations...</div>';
        const res = await fetch(CSV_URL);
        const text = await res.text();
        const rows = text.trim().split('\n').slice(1);
        const stationMap = {};
        rows.forEach(row => {
          const cols = parseCSVRow(row);
          const timestamp = cols[0]||'', name = cols[1]||'', area = cols[2]||'', statusRaw = cols[3]||'', notes = cols[4]||'';
          if (!name) return;
          const t = timeAgo(timestamp);
          stationMap[name] = { name, zone: area||'Other', status: parseStatus(statusRaw), notes, updated: t.text, outdated: t.old };
        });
        allStations = Object.values(stationMap);
        if (allStations.length === 0) {
          allStations = [
            {name:"TotalEnergies — Nakasero",zone:"Nakasero",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"Shell — Kampala Road",zone:"City Centre",status:"queue",updated:"sample",outdated:false,notes:""},
            {name:"Stabex — Kabalagala",zone:"Kabalagala",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"TotalEnergies — Ntinda",zone:"Ntinda",status:"empty",updated:"sample",outdated:false,notes:""},
            {name:"Oryx — Bugolobi",zone:"Bugolobi",status:"queue",updated:"sample",outdated:false,notes:""},
            {name:"Shell — Entebbe Road",zone:"Makindye",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"Stabex — Wandegeya",zone:"Wandegeya",status:"empty",updated:"sample",outdated:false,notes:""},
            {name:"TotalEnergies — Lugogo",zone:"Lugogo",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"Oryx — Naalya",zone:"Naalya",status:"queue",updated:"sample",outdated:false,notes:""},
            {name:"Vivo Energy — Bukoto",zone:"Bukoto",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"Shell — Makerere",zone:"Makerere",status:"available",updated:"sample",outdated:false,notes:""},
            {name:"TotalEnergies — Kireka",zone:"Kireka",status:"empty",updated:"sample",outdated:false,notes:""},
          ];
        }
        renderZones(); render();
      } catch(e) {
        document.getElementById('list').innerHTML = '<div class="empty-state"><div style="font-size:36px">⚠️</div><p>Could not load data. Please try again.</p></div>';
      }
    }

    function renderZones() {
      const zones = ["All zones", ...[...new Set(allStations.map(s=>s.zone))].sort()];
      document.getElementById('zones').innerHTML = zones.map(z=>`<button class="zbtn${z===zone?' on':''}" onclick="setZone('${z}')">${z}</button>`).join('');
    }

    function setZone(z) { zone=z; renderZones(); render(); }
    function setFilter(f,btn) { filter=f; document.querySelectorAll('.fbtn').forEach(b=>b.className='fbtn'); btn.classList.add(f==='all'?'fa':f==='available'?'fg':f==='queue'?'fo':'fr'); render(); }
    function setFuel(f) { fuel=f; document.getElementById('fp').className='ftog'+(f==='petrol'?' on':''); document.getElementById('fd').className='ftog'+(f==='diesel'?' on':''); render(); }

    function render() {
      const q = document.getElementById('search').value.toLowerCase();
      let list = allStations.filter(s => {
        if (zone !== "All zones" && s.zone !== zone) return false;
        if (filter !== 'all' && s.status !== filter) return false;
        if (q && !s.name.toLowerCase().includes(q) && !s.zone.toLowerCase().includes(q)) return false;
        return true;
      });
      if (nearMe && userLat) list = list.sort((a,b) => (a.distKm||99) - (b.distKm||99));
      document.getElementById('ca').textContent = allStations.filter(s=>s.status==='available').length;
      document.getElementById('cq').textContent = allStations.filter(s=>s.status==='queue').length;
      document.getElementById('ce').textContent = allStations.filter(s=>s.status==='empty').length;
      const el = document.getElementById('list');
      if (!list.length) { el.innerHTML=`<div class="empty-state"><div style="font-size:36px">⛽</div><p>No stations found.</p></div>`; return; }
      el.innerHTML = list.map(s => {
        const badge = s.status==='available'?`<span class="badge bav">✓ Available</span>`:s.status==='queue'?`<span class="badge bqu">⏳ Queue</span>`:`<span class="badge bem">✕ Empty</span>`;
        const notes = s.notes?`<div style="font-size:11px;color:var(--muted);margin-top:5px">💬 ${s.notes}</div>`:'';
        const timeLabel = s.outdated
          ?`<span style="color:#D97706;font-size:10px;font-family:'Space Mono',monospace;">⚠️ ${s.updated} · may be outdated</span>`
          :`<span style="color:#bbb;font-size:10px;font-family:'Space Mono',monospace;">updated ${s.updated}</span>`;
        const count = confirmations[s.name]||0;
        const distLabel = s.distKm ? `· ${s.distKm.toFixed(1)} km away` : '';
        const safeName = s.name.replace(/'/g,"\\'");
        return `<article class="card ${s.status}">
          <div class="ct"><div><div class="cn">${s.name}</div><div class="ca">${s.zone} ${distLabel}</div>${notes}</div>${badge}</div>
          <div class="cb"><div class="ftags"><span class="ftag">PETROL</span><span class="ftag">DIESEL</span></div><div class="ctime">${timeLabel}</div></div>
          <div class="card-meta">
            <span class="confirm-count">${count>0?`✓ ${count} confirmed`:''}</span>
            <button class="share-btn" onclick="shareStation('${safeName}')">🔗 Share</button>
          </div>
          <div class="card-actions">
            <button class="btn-confirm" onclick="confirmStation('${safeName}')">✓ Still the same${count>0?` (${count})`:''}</button>
            <a class="btn-change" href="${FORM_URL}" target="_blank" rel="noopener">⚡ Situation changed?</a>
          </div>
        </article>`;
      }).join('');
    }

    function tick() { document.getElementById('clk').textContent = new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); }
    function tickCD() {
      countdown--;
      if (countdown<=0){countdown=120;loadData();}
      const m=Math.floor(countdown/60),s=countdown%60;
      document.getElementById('nxt').textContent=`${m}:${s.toString().padStart(2,'0')}`;
    }

    loadData(); tick();
    setInterval(tick,1000); setInterval(tickCD,1000);
  </script>
</body>
</html>
